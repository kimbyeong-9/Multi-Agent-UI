deploy:
  needs: build-and-push
  runs-on: [self-hosted, fastapi-server]

  steps:
    - name: GHCR Login
      run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.REPO_USER }} --password-stdin
    
    - name: Pull latest image
      run: docker pull ghcr.io/${{ secrets.REPO_USER }}/multi-agent-ui:latest

    - name: Stop old container
      run: |
        docker image prune -f
        docker logout

    - name: Run container
      run: |
        docker-compose up -d

    - name: Health check
      run: |
        sleep 5
        if curl -sSf http://localhost:37123/ > /dev/null; then
          echo "multi-agent-ui is UP"
        else
          echo "Health check failed"
          docker logs multi-agent-ui --tail 200
          exit 1
        fi
